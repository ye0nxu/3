name: PJ_310_LLM_SAM3
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - git
  - ffmpeg
  - setuptools=82.0.0
  - wheel=0.46.3
  - numpy=1.26.4
  - pyyaml=6.0.3
  - pip:
      # ── PyTorch (SAM3 requires torch >= 2.7.0) ──────────────────────────
      - --index-url https://pypi.org/simple
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.7.0+cu126
      - torchvision==0.22.0+cu126
      - torchaudio==2.7.0+cu126

      # ── 객체 탐지 / 추적 ─────────────────────────────────────────────────
      - ultralytics==8.4.14
      - ultralytics-thop==2.0.18
      - lap==0.5.13

      # ── 이미지 / 비디오 처리 ──────────────────────────────────────────────
      - opencv-python==4.10.0.84
      - pillow==12.1.1
      - decord==0.6.0

      # ── GUI ──────────────────────────────────────────────────────────────
      - pyqt6==6.9.1
      - pyqt6-qt6==6.9.1
      - pyqt6-sip==13.8.0

      # ── 유틸리티 ─────────────────────────────────────────────────────────
      - tqdm==4.67.3
      - json5==0.13.0
      - psutil==7.2.2

      # ── 서버 / 네트워크 ───────────────────────────────────────────────────
      - fastapi==0.135.1
      - uvicorn==0.41.0
      - httpx==0.28.1
      - paramiko==4.0.0

      # ── LLM 추론 (Qwen2.5 등) ────────────────────────────────────────────
      - transformers==5.3.0
      - accelerate==1.13.0
      - sentencepiece==0.2.1
      - safetensors==0.7.0
      - huggingface_hub==1.5.0
      - tokenizers==0.22.2
      - bitsandbytes==0.49.2

      # ── SAM3 모델 의존성 ──────────────────────────────────────────────────
      - timm==1.0.22
      - ftfy==6.3.1
      - iopath==0.1.10
      - einops==0.8.2

      # ── 데이터 분석 / 시각화 ─────────────────────────────────────────────
      - supervision==0.25.1
      - matplotlib==3.9.4
      - pandas==3.0.1
      - scipy==1.17.1
      - scikit-learn>=1.3.0

      # ── Windows GPU 커널 (Linux 서버라면 제거) ───────────────────────────
      - triton-windows==3.6.0.post26
